<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理后台</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="scripts/main.js"></script>
  </head>
  <body>
    <header>
      <h1>博客管理后台</h1>
      <nav>
        <a href="index.html">返回首页</a>
      </nav>
    </header>
    <main>
      <!-- Credentials section -->
      <form id="credentials-form">
        <h2>凭证设置</h2>
        <div class="field">
          <label for="owner">GitHub 用户名</label>
          <input type="text" id="owner" placeholder="your‑github‑username" />
        </div>
        <div class="field">
          <label for="repo">仓库名称</label>
          <input type="text" id="repo" placeholder="repository-name" />
        </div>
        <div class="field">
          <label for="branch">分支名称</label>
          <input type="text" id="branch" value="main" />
        </div>
        <div class="field">
          <label for="token">GitHub 访问令牌 (PAT)</label>
          <input type="password" id="token" placeholder="ghp_..." />
        </div>
        <button type="button" id="save-credentials">保存凭证</button>
        <p id="cred-status" style="margin-top:0.5rem;"></p>
      </form>
      <!-- Config section -->
      <form id="config-form" style="margin-top:2rem;">
        <h2>站点设置</h2>
        <div class="field">
          <label for="config-title">博客标题</label>
          <input type="text" id="config-title" />
        </div>
        <div class="field">
          <label for="config-description">博客描述</label>
          <input type="text" id="config-description" />
        </div>
        <button type="button" id="save-config">保存设置</button>
        <p id="config-status" style="margin-top:0.5rem;"></p>
      </form>
      <!-- New post section -->
      <form id="post-form" style="margin-top:2rem;">
        <h2>发布新文章</h2>
        <div class="field">
          <label for="post-title">文章标题</label>
          <input type="text" id="post-title-input" />
        </div>
        <div class="field">
          <label for="post-author">作者</label>
          <input type="text" id="post-author-input" />
        </div>
        <div class="field">
          <label for="post-slug">自定义链接 (可选)</label>
          <input type="text" id="post-slug-input" placeholder="自动根据标题生成" />
        </div>
        <div class="field">
          <label for="post-content">正文</label>
          <textarea id="post-content-input"></textarea>
        </div>
        <button type="button" id="publish-post">发布文章</button>
        <p id="post-status" style="margin-top:0.5rem;"></p>
      </form>
    </main>
    <footer>
      &copy; <span id="year"></span>
    </footer>
    <script>
      // Set current year in footer
      document.getElementById('year').innerText = new Date().getFullYear();

      // Populate credential fields from localStorage
      const ownerInput = document.getElementById('owner');
      const repoInput = document.getElementById('repo');
      const branchInput = document.getElementById('branch');
      const tokenInput = document.getElementById('token');
      // Fill values if stored
      ownerInput.value = localStorage.getItem('gh_owner') || '';
      repoInput.value = localStorage.getItem('gh_repo') || '';
      branchInput.value = localStorage.getItem('gh_branch') || 'main';
      tokenInput.value = localStorage.getItem('gh_token') || '';

      // Populate config fields from remote config if possible
      (async () => {
        try {
          const cfg = await loadConfig();
          document.getElementById('config-title').value = cfg.title || '';
          document.getElementById('config-description').value = cfg.description || '';
        } catch (err) {
          console.warn('无法加载配置：', err);
        }
      })();

      // Save credentials button
      document.getElementById('save-credentials').addEventListener('click', () => {
        localStorage.setItem('gh_owner', ownerInput.value.trim());
        localStorage.setItem('gh_repo', repoInput.value.trim());
        localStorage.setItem('gh_branch', branchInput.value.trim());
        localStorage.setItem('gh_token', tokenInput.value.trim());
        const credStatus = document.getElementById('cred-status');
        credStatus.textContent = '凭证已保存。';
        credStatus.style.color = 'green';
      });

      // Save config button
      document.getElementById('save-config').addEventListener('click', async () => {
        const titleEl = document.getElementById('config-title');
        const descEl = document.getElementById('config-description');
        const statusEl = document.getElementById('config-status');
        statusEl.textContent = '正在保存…';
        statusEl.style.color = '#333';
        await saveConfigFromForm(titleEl, descEl, statusEl);
      });

      // Publish post button
      document.getElementById('publish-post').addEventListener('click', async () => {
        const titleEl = document.getElementById('post-title-input');
        const authorEl = document.getElementById('post-author-input');
        const slugEl = document.getElementById('post-slug-input');
        const contentEl = document.getElementById('post-content-input');
        const statusEl = document.getElementById('post-status');
        if (!titleEl.value.trim() || !contentEl.value.trim()) {
          statusEl.textContent = '标题和正文不能为空。';
          statusEl.style.color = 'red';
          return;
        }
        statusEl.textContent = '正在发布…';
        statusEl.style.color = '#333';
        await publishNewPost(titleEl, authorEl, slugEl, contentEl, statusEl);
      });
    </script>
  </body>
</html>
